name: Deploy to Azure Container Apps

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  RESOURCE_GROUP: rg-copilot-sdk-agent
  APP_NAME: copilot-sdk-agent
  LOCATION: japaneast

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy Infrastructure (Bicep)
        uses: azure/arm-deploy@v2
        id: bicep
        with:
          resourceGroupName: ${{ env.RESOURCE_GROUP }}
          template: infra/main.bicep
          parameters: appName=${{ env.APP_NAME }}
          failOnStdErr: false

      - name: Build and push Docker image
        run: |
          ACR_SERVER="${{ steps.bicep.outputs.acrLoginServer }}"
          ACR_NAME="${{ steps.bicep.outputs.acrName }}"

          # Login to ACR
          az acr login --name $ACR_NAME

          # Build and push
          docker build -t $ACR_SERVER/${{ env.APP_NAME }}:${{ github.sha }} .
          docker push $ACR_SERVER/${{ env.APP_NAME }}:${{ github.sha }}

          # Also tag as latest
          docker tag $ACR_SERVER/${{ env.APP_NAME }}:${{ github.sha }} $ACR_SERVER/${{ env.APP_NAME }}:latest
          docker push $ACR_SERVER/${{ env.APP_NAME }}:latest

      - name: Deploy Container App
        run: |
          ACR_SERVER="${{ steps.bicep.outputs.acrLoginServer }}"
          ACR_NAME="${{ steps.bicep.outputs.acrName }}"
          ACR_PASSWORD=$(az acr credential show --name $ACR_NAME --query "passwords[0].value" -o tsv)
          ENV_NAME="${{ steps.bicep.outputs.environmentName }}"

          # Check if container app exists
          EXISTS=$(az containerapp show --name ca-${{ env.APP_NAME }} --resource-group ${{ env.RESOURCE_GROUP }} --query name -o tsv 2>/dev/null || echo "")

          if [ -z "$EXISTS" ]; then
            echo "Creating new Container App..."
            az containerapp create \
              --name ca-${{ env.APP_NAME }} \
              --resource-group ${{ env.RESOURCE_GROUP }} \
              --environment $ENV_NAME \
              --image $ACR_SERVER/${{ env.APP_NAME }}:${{ github.sha }} \
              --registry-server $ACR_SERVER \
              --registry-username $(az acr credential show --name $ACR_NAME --query username -o tsv) \
              --registry-password "$ACR_PASSWORD" \
              --target-port 3000 \
              --ingress external \
              --cpu 0.5 \
              --memory 1Gi \
              --min-replicas 0 \
              --max-replicas 3 \
              --env-vars \
                "NODE_ENV=production" \
                "PORT=3000" \
                "GITHUB_TOKEN=secretref:github-token" \
                "TAVILY_API_KEY=secretref:tavily-api-key" \
                "MODEL_NAME=${{ vars.MODEL_NAME || 'claude-opus-4.6' }}" \
              --secrets \
                "github-token=${{ secrets.APP_GITHUB_TOKEN }}" \
                "tavily-api-key=${{ secrets.TAVILY_API_KEY }}"
          else
            echo "Updating existing Container App..."
            az containerapp secret set \
              --name ca-${{ env.APP_NAME }} \
              --resource-group ${{ env.RESOURCE_GROUP }} \
              --secrets \
                "github-token=${{ secrets.APP_GITHUB_TOKEN }}" \
                "tavily-api-key=${{ secrets.TAVILY_API_KEY }}" 2>/dev/null || true

            az containerapp update \
              --name ca-${{ env.APP_NAME }} \
              --resource-group ${{ env.RESOURCE_GROUP }} \
              --image $ACR_SERVER/${{ env.APP_NAME }}:${{ github.sha }}
          fi

      - name: Show deployment URL
        run: |
          FQDN=$(az containerapp show --name ca-${{ env.APP_NAME }} --resource-group ${{ env.RESOURCE_GROUP }} --query "properties.configuration.ingress.fqdn" -o tsv)
          echo "🚀 Deployed to: https://$FQDN"
