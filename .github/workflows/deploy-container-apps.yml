name: Deploy to Azure Container Apps

on:
  push:
    branches: [master]
  workflow_dispatch:

env:
  RESOURCE_GROUP: rg-copilot-sdk-agent
  APP_NAME: copilot-sdk-agent
  LOCATION: japaneast

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy Infrastructure (Bicep)
        uses: azure/arm-deploy@v2
        id: bicep
        with:
          resourceGroupName: ${{ env.RESOURCE_GROUP }}
          template: infra/main.bicep
          parameters: appName=${{ env.APP_NAME }} imageTag=${{ github.sha }}
          failOnStdErr: false

      - name: Build and push Docker image
        run: |
          ACR_SERVER="${{ steps.bicep.outputs.acrLoginServer }}"
          ACR_NAME="${{ steps.bicep.outputs.acrName }}"

          # Login to ACR
          az acr login --name $ACR_NAME

          # Build and push
          docker build -t $ACR_SERVER/${{ env.APP_NAME }}:${{ github.sha }} .
          docker push $ACR_SERVER/${{ env.APP_NAME }}:${{ github.sha }}

          # Also tag as latest
          docker tag $ACR_SERVER/${{ env.APP_NAME }}:${{ github.sha }} $ACR_SERVER/${{ env.APP_NAME }}:latest
          docker push $ACR_SERVER/${{ env.APP_NAME }}:latest

      - name: Update Container App
        run: |
          az containerapp update \
            --name ca-${{ env.APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --image ${{ steps.bicep.outputs.acrLoginServer }}/${{ env.APP_NAME }}:${{ github.sha }} \
            --set-env-vars \
              "GITHUB_TOKEN=secretref:github-token" \
              "TAVILY_API_KEY=secretref:tavily-api-key" \
              "MODEL_NAME=${{ vars.MODEL_NAME || 'claude-opus-4.6' }}"

      - name: Set secrets in Container App
        run: |
          az containerapp secret set \
            --name ca-${{ env.APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --secrets \
              "github-token=${{ secrets.APP_GITHUB_TOKEN }}" \
              "tavily-api-key=${{ secrets.TAVILY_API_KEY }}"

      - name: Show deployment URL
        run: |
          echo "🚀 Deployed to: ${{ steps.bicep.outputs.containerAppUrl }}"
